name: Build Windows EXE

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name to upload release asset to (optional if running on a tag)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install textual pyinstaller

      - name: Write build SHA
        run: |
          "${{ github.sha }}" | Out-File -FilePath src\.version -Encoding utf8 -NoNewline

      - name: Download macrecovery.py
        run: |
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/acidanthera/OpenCorePkg/master/Utilities/macrecovery/macrecovery.py" -OutFile "src\macrecovery.py"

      - name: Build EXE
        run: |
          pyinstaller --onefile --name HackMate --paths src `
            --hidden-import hardware `
            --hidden-import kexts `
            --hidden-import config_gen `
            --hidden-import smbios `
            --hidden-import recovery `
            --hidden-import ssdt `
            --hidden-import updater `
            --hidden-import efi_check `
            --hidden-import compat `
            --hidden-import oc_log `
            --hidden-import config_editor `
            --hidden-import tkinter `
            --hidden-import tkinter.filedialog `
            --add-data "src\.version;." `
            --add-data "src\macrecovery.py;." `
            src/hackmate.py

      - name: Upload EXE to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '')
        with:
          files: dist/HackMate.exe
          tag_name: ${{ inputs.tag_name || github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
